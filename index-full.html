<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herbcana — Em breve</title>
<meta name="description" content="Herbcana — manejo de herbicidas para cana-de-açúcar. Em breve.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --canopy:#0E2A14;
    --cane:#B6E021;
    --paper:#F5F3EA;
    --mist:rgba(245,243,234,.72);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"IBM Plex Mono",monospace;
    background:var(--canopy);
    color:var(--paper);
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;
    overflow:hidden;position:relative;
  }
  body::before{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(100deg, transparent 0 40px, rgba(182,224,33,.04) 40px 41px);
    transform:skewY(-3deg) scale(1.2);pointer-events:none;
  }
  .wrap{position:relative;z-index:2;max-width:540px}
  .leaf{width:52px;height:52px;margin:0 auto 26px;display:block}
  .brand{
    font-family:"Bricolage Grotesque";font-weight:800;
    font-size:clamp(38px,9vw,60px);letter-spacing:-.03em;line-height:1;
    margin-bottom:18px;
  }
  .tag{
    display:inline-block;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--cane);border:1px solid rgba(182,224,33,.35);border-radius:999px;
    padding:7px 16px;margin-bottom:24px;
  }
  p{font-size:16px;color:var(--mist);line-height:1.6;max-width:42ch;margin:0 auto}
  .soon{margin-top:30px;font-size:13px;color:rgba(245,243,234,.45);letter-spacing:.04em}
</style>
</head>
<body>
  <div class="wrap">
    <svg class="leaf" viewBox="0 0 24 24" fill="none">
      <path d="M12 22C7 18 4 13 4 8c0-3 2-6 8-6 0 6-3 11-8 14" stroke="#B6E021" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M12 22c5-4 8-9 8-14 0-3-2-6-8-6" stroke="#B6E021" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="brand">Herbcana</div>
    <span class="tag">Em breve</span>
    <p>Recomendação de herbicida para cana-de-açúcar, calculada na lavoura. Estamos finalizando os últimos detalhes.</p>
    <div class="soon">Lançamento em breve · Google Play</div>
  </div>
</body>
</html>
