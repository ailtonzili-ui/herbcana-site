<style>
:root{
  --fundo:#0a1710;
  --fundo-2:#0e1f16;
  --verde:#1f3a2e;
  --creme:#f4f0e6;
  --creme-60:rgba(244,240,230,.62);
  --creme-40:rgba(244,240,230,.4);
  --ouro:#c79a3a;
  --ouro-claro:#e0bc6a;
  --vidro:rgba(244,240,230,.045);
  --vidro-borda:rgba(244,240,230,.09);
  --brilho:rgba(199,154,58,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Manrope',sans-serif;
  background:var(--fundo);
  color:var(--creme);
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::selection{background:var(--ouro);color:var(--fundo)}

/* fundo ambiente: malha de brilhos */
.ambiente{
  position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(ellipse 800px 500px at 85% -5%, rgba(199,154,58,.13), transparent 55%),
    radial-gradient(ellipse 700px 700px at -10% 40%, rgba(31,58,46,.55), transparent 60%),
    radial-gradient(ellipse 900px 600px at 110% 85%, rgba(199,154,58,.07), transparent 55%),
    var(--fundo);
}
.ambiente::after{
  content:"";position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(244,240,230,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(244,240,230,.02) 1px, transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, black, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, black, transparent 75%);
}

.wrap{max-width:1140px;margin:0 auto;padding:0 24px}
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ouro-claro);
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(199,154,58,.08);
  border:1px solid rgba(199,154,58,.25);
  border-radius:999px;padding:7px 16px;
}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ouro);box-shadow:0 0 10px var(--brilho)}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;line-height:1.08;letter-spacing:-.01em}

.btn{
  display:inline-flex;align-items:center;gap:10px;
  font-weight:700;font-size:.95rem;
  padding:16px 30px;border-radius:16px;text-decoration:none;
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
  cursor:pointer;border:none;position:relative;
}
.btn:focus-visible{outline:3px solid var(--ouro);outline-offset:3px}
.btn-ouro{
  background:linear-gradient(135deg, var(--ouro-claro), var(--ouro));
  color:var(--fundo);
  box-shadow:0 0 0 1px rgba(224,188,106,.4), 0 8px 30px rgba(199,154,58,.28);
}
.btn-ouro:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(224,188,106,.6), 0 14px 44px rgba(199,154,58,.42)}
.btn-vidro{
  background:var(--vidro);color:var(--creme);
  border:1px solid var(--vidro-borda);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.btn-vidro:hover{border-color:rgba(199,154,58,.5);color:var(--ouro-claro);transform:translateY(-2px)}

/* ---------- header vidro flutuante ---------- */
header{
  position:fixed;top:14px;left:0;right:0;z-index:50;
}
.nav{
  max-width:1140px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  height:60px;padding:0 22px;
  margin-left:16px;margin-right:16px;
  background:rgba(10,23,16,.6);
  border:1px solid var(--vidro-borda);
  border-radius:18px;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  box-shadow:0 10px 40px rgba(0,0,0,.35);
}
@media(min-width:1180px){.nav{margin-left:auto;margin-right:auto}}
.logo{
  display:inline-flex;align-items:center;gap:10px;
  font-family:'Fraunces',serif;font-weight:700;font-size:1.3rem;
  color:var(--creme);text-decoration:none;
}
.logo em{font-style:normal;color:var(--ouro-claro)}
.logo .emblema{height:34px;width:auto;display:block;filter:drop-shadow(0 0 8px rgba(120,200,80,.25))}
.logo .texto{display:block}
.logo small{
  display:block;font-family:'JetBrains Mono',monospace;font-weight:400;
  font-size:.52rem;letter-spacing:.34em;color:var(--creme-40);
  text-transform:uppercase;margin-top:-3px;
}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{
  color:var(--creme-60);text-decoration:none;font-size:.88rem;font-weight:600;
  transition:color .15s ease;
}
.nav-links a:hover{color:var(--ouro-claro)}
.nav-cta{
  background:linear-gradient(135deg, var(--ouro-claro), var(--ouro));
  color:var(--fundo)!important;
  padding:9px 20px;border-radius:12px;font-weight:800;
}
@media(max-width:760px){.nav-links a:not(.nav-cta){display:none}}

/* ---------- hero ---------- */
.hero{padding:170px 0 110px;position:relative}
.hero-grid{
  display:grid;grid-template-columns:1.05fr .95fr;gap:60px;align-items:center;
}
.hero h1{
  font-size:clamp(2.6rem,5.4vw,4.1rem);
  margin:26px 0 24px;
}
.hero h1 .destaque{
  font-style:italic;
  background:linear-gradient(115deg, var(--ouro-claro) 20%, var(--ouro) 60%, #a87e2c);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p.lead{
  font-size:1.12rem;color:var(--creme-60);max-width:34rem;margin-bottom:36px;
}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap}
.hero-meta{
  margin-top:44px;display:flex;gap:14px;flex-wrap:wrap;
}
.hero-meta span{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.05em;
  color:var(--creme-60);
  background:var(--vidro);border:1px solid var(--vidro-borda);
  border-radius:12px;padding:9px 16px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.hero-meta b{color:var(--ouro-claro);font-weight:700}

/* ---------- mockup do celular ---------- */
.palco{position:relative;display:flex;justify-content:center}
.palco::before{
  content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle, rgba(199,154,58,.22), transparent 65%);
  filter:blur(20px);
}
.fone{
  width:295px;position:relative;
  background:linear-gradient(160deg,#182f23,#0b1912);
  border-radius:42px;padding:12px;
  border:1px solid rgba(224,188,106,.35);
  box-shadow:
    0 0 60px rgba(199,154,58,.18),
    0 40px 90px rgba(0,0,0,.6);
  transform:rotate(2deg);
  animation:flutuar 7s ease-in-out infinite;
}
@keyframes flutuar{
  0%,100%{transform:rotate(2deg) translateY(0)}
  50%{transform:rotate(2deg) translateY(-14px)}
}
.tela{
  background:linear-gradient(180deg,#10241a,#0a1811);
  border-radius:32px;overflow:hidden;font-size:.68rem;
}
.tela-topo{
  padding:16px 16px 12px;
  border-bottom:1px solid rgba(199,154,58,.18);
  display:flex;justify-content:space-between;align-items:center;
}
.tela-topo .marca{font-family:'Fraunces',serif;font-weight:700;font-size:.95rem;color:var(--creme)}
.tela-topo .marca em{font-style:normal;color:var(--ouro-claro)}
.tela-topo .ver{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--creme-40)}
.tela-corpo{padding:14px 16px 18px}
.chip{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.55rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--ouro-claro);
  border:1px solid rgba(199,154,58,.4);border-radius:999px;
  padding:4px 11px;margin-bottom:11px;
  background:rgba(199,154,58,.07);
}
.receita{
  background:var(--vidro);border:1px solid var(--vidro-borda);
  border-radius:16px;padding:12px;margin-bottom:11px;
}
.receita h4{font-weight:700;font-size:.72rem;color:var(--creme);margin-bottom:6px}
.receita .linha-dose{
  display:flex;justify-content:space-between;padding:5px 0;
  border-top:1px dashed rgba(244,240,230,.1);
  color:var(--creme-60);
}
.receita .linha-dose:first-of-type{border-top:none}
.receita .dose{font-family:'JetBrains Mono',monospace;color:var(--ouro-claro);font-weight:500}
.barra-argila{margin-top:5px}
.barra-argila .rotulo{
  display:flex;justify-content:space-between;
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  color:var(--creme-40);margin-bottom:6px;letter-spacing:.05em;
}
.barra-argila .trilho{
  height:8px;border-radius:999px;
  background:linear-gradient(90deg,#d7c08a,#a97e3c,#6e4a24);
  position:relative;
}
.barra-argila .marcador{
  position:absolute;top:50%;left:62%;transform:translate(-50%,-50%);
  width:16px;height:16px;border-radius:50%;
  background:var(--creme);border:3px solid var(--ouro);
  box-shadow:0 0 12px var(--brilho);
}
.total-app{
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(135deg, var(--ouro-claro), var(--ouro));
  border-radius:14px;padding:11px 14px;margin-top:13px;
  color:var(--fundo);font-weight:800;font-size:.78rem;
  box-shadow:0 6px 22px rgba(199,154,58,.3);
}
.total-app .valor{font-family:'JetBrains Mono',monospace}
@media(max-width:900px){
  .hero-grid{grid-template-columns:1fr;gap:56px}
  .fone{transform:rotate(0deg)}
  @keyframes flutuar{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
}

/* ---------- seções ---------- */
section{padding:100px 0;position:relative}
.sec-titulo{max-width:660px;margin-bottom:56px}
.sec-titulo h2{font-size:clamp(1.9rem,4vw,2.9rem);margin:20px 0 16px}
.sec-titulo p{color:var(--creme-60);font-size:1.03rem}

/* grid bento dos pilares */
.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{
  background:var(--vidro);
  border:1px solid var(--vidro-borda);
  border-radius:24px;padding:32px 30px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease;
  position:relative;overflow:hidden;
}
.card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(224,188,106,.5), transparent);
  opacity:0;transition:opacity .25s ease;
}
.card:hover{transform:translateY(-5px);border-color:rgba(199,154,58,.35);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.card:hover::before{opacity:1}
.card.grande{grid-column:span 2}
.card .icone{
  width:50px;height:50px;border-radius:15px;
  background:rgba(199,154,58,.12);
  border:1px solid rgba(199,154,58,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;margin-bottom:20px;
}
.card h3{font-size:1.3rem;margin-bottom:10px;color:var(--creme)}
.card p{font-size:.93rem;color:var(--creme-60)}
@media(max-width:820px){
  .bento{grid-template-columns:1fr}
  .card.grande{grid-column:span 1}
}

/* como funciona */
.passos{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;counter-reset:passo}
.passo{
  counter-increment:passo;
  background:var(--vidro);border:1px solid var(--vidro-borda);
  border-radius:24px;padding:30px 28px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:relative;
}
.passo::before{
  content:"0" counter(passo);
  font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;
  color:var(--fundo);letter-spacing:.05em;
  background:linear-gradient(135deg, var(--ouro-claro), var(--ouro));
  border-radius:10px;padding:5px 12px;display:inline-block;
  box-shadow:0 4px 16px rgba(199,154,58,.3);
}
.passo h3{font-size:1.18rem;margin:16px 0 8px;color:var(--creme)}
.passo p{font-size:.9rem;color:var(--creme-60)}
@media(max-width:760px){.passos{grid-template-columns:1fr}}

/* faixa de números */
.faixa-dados{
  border-top:1px solid var(--vidro-borda);
  border-bottom:1px solid var(--vidro-borda);
  background:linear-gradient(180deg, rgba(199,154,58,.04), transparent);
  padding:72px 0;
}
.dados-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;text-align:center}
.dado .num{
  font-family:'Fraunces',serif;font-weight:700;
  font-size:clamp(2.1rem,4.2vw,3rem);
  background:linear-gradient(115deg, var(--creme), var(--ouro-claro));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.dado .rot{
  font-family:'JetBrains Mono',monospace;font-size:.66rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--creme-40);
  margin-top:8px;
}
@media(max-width:760px){.dados-grid{grid-template-columns:repeat(2,1fr)}}

/* preço */
.preco-card{
  max-width:540px;margin:0 auto;
  background:var(--vidro);
  border:1px solid rgba(199,154,58,.3);
  border-radius:32px;padding:52px 46px;
  text-align:center;position:relative;overflow:hidden;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 0 70px rgba(199,154,58,.1), 0 30px 80px rgba(0,0,0,.45);
}
.preco-card::before{
  content:"";position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg, transparent, var(--ouro-claro), transparent);
}
.preco-card .chip-preco{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--ouro-claro);
  border:1px solid rgba(199,154,58,.4);border-radius:999px;
  display:inline-block;padding:6px 18px;margin-bottom:24px;
  background:rgba(199,154,58,.08);
}
.preco-card .valor{
  font-family:'Fraunces',serif;font-weight:700;font-size:3.8rem;line-height:1;
  background:linear-gradient(115deg, var(--creme) 30%, var(--ouro-claro));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.preco-card .valor small{font-size:1.4rem;vertical-align:super;font-weight:600}
.preco-card .cond{color:var(--creme-40);font-size:.9rem;margin:12px 0 32px}
.preco-lista{list-style:none;text-align:left;margin:0 auto 36px;max-width:340px}
.preco-lista li{
  padding:10px 0;border-bottom:1px dashed rgba(244,240,230,.1);
  font-size:.93rem;display:flex;gap:12px;align-items:flex-start;color:var(--creme-60);
}
.preco-lista li::before{content:"✓";color:var(--ouro-claro);font-weight:800}

/* zilyon */
.zilyon-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
.zilyon .selo{
  font-family:'Fraunces',serif;font-weight:700;font-size:2.1rem;
  letter-spacing:.06em;margin-top:20px;
}
.zilyon .selo em{
  font-style:normal;
  background:linear-gradient(115deg, var(--ouro-claro), var(--ouro));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.zilyon .selo-sub{
  display:block;font-family:'JetBrains Mono',monospace;font-weight:400;
  font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--creme-60);margin-top:4px;
}
.zilyon p{color:var(--creme-60);margin-top:14px;font-size:.98rem}
.assinatura{
  font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ouro-claro);margin-top:24px;
}
.credito-zia{
  display:inline-block;
  font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--creme-60);
  border:1px solid rgba(199,154,58,.3);border-radius:999px;
  background:rgba(199,154,58,.06);
  padding:8px 18px;margin-top:16px;
}
@media(max-width:820px){.zilyon-grid{grid-template-columns:1fr}}

/* footer */
footer{
  border-top:1px solid var(--vidro-borda);
  color:var(--creme-40);
  padding:56px 0 42px;font-size:.85rem;
}
.foot-grid{display:flex;justify-content:space-between;gap:32px;flex-wrap:wrap;align-items:flex-start}
.foot-grid .logo{font-size:1.2rem}
footer a{color:var(--creme-60);text-decoration:none}
footer a:hover{color:var(--ouro-claro)}
.foot-links{display:flex;gap:24px;flex-wrap:wrap}
.foot-legal{
  margin-top:36px;padding-top:24px;border-top:1px solid var(--vidro-borda);
  font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.05em;
  display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
}

/* animações de entrada */
.revelar{opacity:0;transform:translateY(26px);transition:opacity .7s ease, transform .7s ease}
.revelar.visivel{opacity:1;transform:translateY(0)}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .revelar{opacity:1;transform:none}
  html{scroll-behavior:auto}
}

<script>
/* ─── Este script preenche a página com o CONTEUDO editado lá em cima ─── */
const C = CONTEUDO;
const el = id => document.getElementById(id);

/* Hero */
el('hero-etiqueta').textContent  = C.hero.etiqueta;
el('hero-titulo1').textContent   = C.hero.titulo1;
el('hero-titulo2').textContent   = C.hero.titulo2;
el('hero-paragrafo').textContent = C.hero.paragrafo;
el('hero-botao1').textContent    = C.hero.botao1;
el('hero-botao2').textContent    = C.hero.botao2;
el('hero-metricas').innerHTML = [C.hero.metrica1, C.hero.metrica2, C.hero.metrica3]
  .map(m => `<span><b>${m.numero}</b> ${m.texto}</span>`).join('');

/* Mockup do celular */
el('mock-versao').textContent         = C.mockup.versao;
el('mock-chip').textContent           = C.mockup.chip;
el('mock-titulo-receita').textContent = C.mockup.tituloReceita;
el('mock-produtos').innerHTML = [C.mockup.produto1, C.mockup.produto2, C.mockup.produto3]
  .map(p => `<div class="linha-dose"><span>${p.nome}</span><span class="dose">${p.dose}</span></div>`).join('');
el('mock-argila-rotulo').textContent = C.mockup.argilaRotulo;
el('mock-argila-valor').textContent  = C.mockup.argilaValor;
el('mock-custo-rotulo').textContent  = C.mockup.custoRotulo;
el('mock-custo-valor').textContent   = C.mockup.custoValor;

/* Pilares (bento) */
el('pilares-etiqueta').textContent  = C.pilares.etiqueta;
el('pilares-titulo').textContent    = C.pilares.titulo;
el('pilares-subtitulo').textContent = C.pilares.subtitulo;
el('pilares-grid').innerHTML = C.pilares.itens.map(p => `
  <div class="card revelar ${p.destaque ? 'grande' : ''}">
    <div class="icone">${p.icone}</div>
    <h3>${p.titulo}</h3>
    <p>${p.texto}</p>
  </div>`).join('');

/* Como funciona */
el('como-etiqueta').textContent = C.comoFunciona.etiqueta;
el('como-titulo').textContent   = C.comoFunciona.titulo;
el('como-passos').innerHTML = C.comoFunciona.passos.map(p => `
  <div class="passo revelar">
    <h3>${p.titulo}</h3>
    <p>${p.texto}</p>
  </div>`).join('');

/* Faixa de números */
el('faixa-numeros').innerHTML = C.numeros.map(n => `
  <div class="dado revelar"><div class="num">${n.numero}</div><div class="rot">${n.rotulo}</div></div>`).join('');

/* Preço */
el('preco-etiqueta').textContent = C.preco.etiqueta;
el('preco-titulo').textContent   = C.preco.titulo;
el('preco-selo').textContent     = C.preco.selo;
el('preco-moeda').textContent    = C.preco.moeda;
el('preco-valor').textContent    = C.preco.valor;
el('preco-condicao').textContent = C.preco.condicao;
el('preco-beneficios').innerHTML = C.preco.beneficios.map(b => `<li>${b}</li>`).join('');
el('preco-botao').textContent    = C.preco.botao;
el('preco-rodape').textContent   = C.preco.rodape;

/* Z.I.A */
el('zilyon-etiqueta').textContent    = C.zilyon.etiqueta;
el('zilyon-paragrafo').textContent   = C.zilyon.paragrafo;
el('zilyon-assinatura').textContent  = C.zilyon.assinatura;
el('zilyon-credito').textContent     = C.zilyon.credito;
el('zilyon-card-titulo').textContent = C.zilyon.cardTitulo;
el('zilyon-card-texto').textContent  = C.zilyon.cardTexto;

/* Rodapé */
el('foot-email').href            = 'mailto:' + C.rodape.email;
el('foot-copyright').textContent = C.rodape.copyright;
el('foot-desenvolvido').textContent = C.rodape.desenvolvidoPor;
el('foot-dominio').textContent   = C.rodape.dominio;

/* Botões da Google Play — usam o linkGooglePlay lá do topo */
document.querySelectorAll('.link-play').forEach(btn => {
  btn.href = C.linkGooglePlay;
  btn.addEventListener('click', function(ev){
    if (C.linkGooglePlay === '#') {
      ev.preventDefault();
      alert(C.preco.avisoEmBreve);
    }
  });
});

/* Revelação ao rolar */
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){e.target.classList.add('visivel');io.unobserve(e.target);}
  });
},{threshold:.12});
document.querySelectorAll('.revelar').forEach(elm=>io.observe(elm));
</script>
